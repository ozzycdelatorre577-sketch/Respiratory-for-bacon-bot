<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BaconVerify — Roblox Account Verification</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=Archivo+Black&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --r:#e8344a;--r2:#c0392b;--r3:#ff6b6b;--r4:#ff8c42;
  --gold:#f5c842;--green:#22d68c;--purple:#a78bfa;
  --bg:#09080a;--s1:#110d0e;--s2:#180f10;--s3:#1e1214;
  --border:rgba(232,52,74,.2);--border2:rgba(232,52,74,.1);
  --t1:#fff;--t2:rgba(255,255,255,.65);--t3:rgba(255,255,255,.35);--t4:rgba(255,255,255,.15);
  --glow:0 0 80px rgba(232,52,74,.18);
  --font:'Syne',sans-serif;--mono:'DM Mono',monospace;--display:'Archivo Black',sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--t1);font-family:var(--font);min-height:100vh;overflow-x:hidden;cursor:default}

/* ─── NOISE OVERLAY ─────────────────────────────────────── */
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:.6;
}

/* ─── AMBIENT BLOBS ─────────────────────────────────────── */
.blobs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18;animation:drift 18s ease-in-out infinite}
.blob1{width:600px;height:600px;background:radial-gradient(#e8344a,#7b241c);top:-200px;left:-200px;animation-delay:0s}
.blob2{width:400px;height:400px;background:radial-gradient(#ff8c42,#c0392b);bottom:-150px;right:-100px;animation-delay:-6s}
.blob3{width:300px;height:300px;background:radial-gradient(#a78bfa,#6d28d9);top:40%;left:60%;animation-delay:-12s;opacity:.1}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.05)}66%{transform:translate(-20px,30px) scale(.97)}}

/* ─── NAV ───────────────────────────────────────────────── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 40px;height:64px;
  background:rgba(9,8,10,.8);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border2);
}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--r),var(--r2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 0 16px rgba(232,52,74,.4)}
.nav-logo-text{font-family:var(--display);font-size:18px;color:#fff;letter-spacing:-0.5px}
.nav-logo-text span{color:var(--r3)}
.nav-links{display:flex;align-items:center;gap:8px}
.nav-link{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600;color:var(--t3);text-decoration:none;transition:color .2s,background .2s}
.nav-link:hover{color:var(--t1);background:rgba(255,255,255,.06)}
.nav-badge{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:700;background:var(--r);color:#fff;border:none;cursor:pointer;transition:all .2s}
.nav-badge:hover{background:var(--r2);transform:translateY(-1px)}

/* ─── HERO ──────────────────────────────────────────────── */
.hero{
  position:relative;z-index:1;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:100px 24px 60px;text-align:center;
}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(232,52,74,.1);border:1px solid rgba(232,52,74,.25);
  border-radius:100px;padding:6px 16px;
  font-size:12px;font-weight:700;color:var(--r3);letter-spacing:1.5px;text-transform:uppercase;
  margin-bottom:28px;animation:fadeUp .6s .1s both;
}
.hero-eyebrow::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--r3);animation:blink 1.5s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.hero-title{
  font-family:var(--display);font-size:clamp(52px,9vw,100px);line-height:.95;
  letter-spacing:-2px;margin-bottom:24px;
  animation:fadeUp .6s .2s both;
}
.hero-title .line1{display:block;color:#fff}
.hero-title .line2{
  display:block;
  background:linear-gradient(100deg,var(--r3),var(--r),var(--r4));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.hero-sub{font-size:17px;color:var(--t2);max-width:480px;line-height:1.7;margin-bottom:48px;animation:fadeUp .6s .3s both}
.hero-sub b{color:#fff}

.hero-stats{
  display:flex;gap:32px;margin-bottom:56px;
  animation:fadeUp .6s .4s both;
}
.stat-pill{text-align:center}
.stat-pill .num{font-family:var(--display);font-size:28px;color:#fff;line-height:1}
.stat-pill .lbl{font-size:12px;color:var(--t3);margin-top:2px;letter-spacing:1px;text-transform:uppercase}

.scroll-hint{font-size:12px;color:var(--t4);animation:fadeUp .6s .6s both;display:flex;flex-direction:column;align-items:center;gap:8px}
.scroll-arrow{width:20px;height:20px;border-right:2px solid var(--t4);border-bottom:2px solid var(--t4);transform:rotate(45deg);animation:bounce 2s ease infinite}
@keyframes bounce{0%,100%{transform:rotate(45deg) translateY(0)}50%{transform:rotate(45deg) translateY(5px)}}

/* ─── SECTION ───────────────────────────────────────────── */
.section{position:relative;z-index:1;padding:80px 24px}
.section-inner{max-width:1000px;margin:0 auto}

/* ─── FEATURES STRIP ────────────────────────────────────── */
.features{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1px;
  background:var(--border2);border:1px solid var(--border2);border-radius:20px;overflow:hidden;
  margin-bottom:80px;
}
.feat{
  background:var(--s1);padding:28px 24px;
  transition:background .3s;
}
.feat:hover{background:var(--s2)}
.feat-icon{font-size:28px;margin-bottom:14px}
.feat-title{font-size:15px;font-weight:700;color:#fff;margin-bottom:6px}
.feat-desc{font-size:13px;color:var(--t3);line-height:1.6}

/* ─── MAIN CARD ─────────────────────────────────────────── */
.card-wrap{
  max-width:560px;margin:0 auto;
  animation:fadeUp .7s .1s both;
}
.card{
  background:var(--s1);
  border:1px solid var(--border);border-radius:24px;
  box-shadow:var(--glow),0 0 0 1px rgba(232,52,74,.05);
  overflow:hidden;position:relative;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(232,52,74,.6),rgba(255,140,66,.4),transparent);
}

/* card header */
.card-header{
  padding:32px 32px 24px;
  background:linear-gradient(180deg,rgba(232,52,74,.06) 0%,transparent 100%);
  border-bottom:1px solid var(--border2);
  display:flex;align-items:center;gap:20px;
}
.mascot{flex-shrink:0;animation:float 3.5s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.card-header-text{}
.card-header-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:6px}
.card-header-title{font-family:var(--display);font-size:26px;color:#fff;line-height:1;margin-bottom:4px}
.card-header-title span{color:var(--r3)}
.card-header-sub{font-size:13px;color:var(--t3);line-height:1.5}

/* steps */
.steps{padding:0 32px;margin-top:24px;display:flex;flex-direction:column;gap:0}
.step{
  display:flex;gap:16px;position:relative;
  padding-bottom:28px;
}
.step:last-child{padding-bottom:0}
.step::before{
  content:'';position:absolute;left:15px;top:32px;bottom:0;
  width:1px;background:var(--border2);
}
.step:last-child::before{display:none}
.step-num{
  width:32px;height:32px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,var(--r),var(--r2));
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;color:#fff;
  box-shadow:0 0 16px rgba(232,52,74,.35);
  position:relative;z-index:1;
}
.step-num.done{background:linear-gradient(135deg,var(--green),#16a34a);box-shadow:0 0 16px rgba(34,214,140,.3)}
.step-num.done::after{content:'✓';font-size:14px}
.step-body{flex:1;padding-top:5px}
.step-title{font-size:14px;font-weight:700;color:#fff;margin-bottom:4px;letter-spacing:.3px}
.step-desc{font-size:12px;color:var(--t3);margin-bottom:12px;line-height:1.5}

/* ── inputs ── */
.field{
  width:100%;background:rgba(0,0,0,.4);
  border:1px solid rgba(255,255,255,.08);border-radius:11px;
  padding:12px 14px;color:#fff;font-size:14px;font-family:var(--mono);
  outline:none;transition:border-color .2s,box-shadow .2s;
}
.field:focus{border-color:rgba(232,52,74,.5);box-shadow:0 0 0 3px rgba(232,52,74,.1)}
.field::placeholder{color:var(--t4);font-family:var(--font)}
.field-hint{font-size:11px;color:var(--t4);margin-top:6px;font-family:var(--mono)}

/* ── fake hcaptcha ── */
.hcap-box{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.08);
  border-radius:11px;padding:14px 16px;cursor:pointer;
  transition:all .2s;user-select:none;position:relative;overflow:hidden;
}
.hcap-box::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(34,214,140,.05),transparent);opacity:0;transition:opacity .3s}
.hcap-box.solved{border-color:rgba(34,214,140,.35);box-shadow:0 0 12px rgba(34,214,140,.1)}
.hcap-box.solved::before{opacity:1}
.hcap-left{display:flex;align-items:center;gap:12px}
.hcap-check{
  width:22px;height:22px;border-radius:6px;flex-shrink:0;
  border:2px solid rgba(255,255,255,.15);background:transparent;
  display:flex;align-items:center;justify-content:center;
  transition:all .25s;
}
.hcap-box.solved .hcap-check{background:var(--green);border-color:var(--green);box-shadow:0 0 10px rgba(34,214,140,.4)}
.hcap-check-inner{width:10px;height:10px;border-right:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(45deg) translate(-1px,-2px);opacity:0;transition:opacity .2s .1s}
.hcap-box.solved .hcap-check-inner{opacity:1}
.hcap-label{font-size:13px;color:var(--t2);font-weight:500}
.hcap-box.solved .hcap-label{color:var(--green)}
.hcap-right{display:flex;flex-direction:column;align-items:center;gap:3px}
.hcap-logo{
  width:28px;height:28px;border-radius:7px;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  display:flex;align-items:center;justify-content:center;font-size:14px;
}
.hcap-text{font-size:9px;color:var(--t4);font-family:var(--mono);text-align:center}

/* ── verify button ── */
.card-footer{padding:24px 32px 28px}
.verify-btn{
  width:100%;padding:16px;
  background:linear-gradient(135deg,var(--r) 0%,var(--r2) 100%);
  border:none;border-radius:13px;color:#fff;
  font-family:var(--display);font-size:16px;letter-spacing:.5px;
  cursor:pointer;position:relative;overflow:hidden;
  box-shadow:0 4px 24px rgba(232,52,74,.45),0 1px 0 rgba(255,255,255,.1) inset;
  transition:transform .15s,box-shadow .2s,opacity .2s;
}
.verify-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.1),transparent);
}
.verify-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 32px rgba(232,52,74,.55)}
.verify-btn:active:not(:disabled){transform:translateY(0)}
.verify-btn:disabled{opacity:.55;cursor:not-allowed}
.verify-btn.loading{animation:pulse 1.2s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.65}}
.btn-inner{display:flex;align-items:center;justify-content:center;gap:10px;position:relative;z-index:1}

.tos-line{text-align:center;font-size:11px;color:var(--t4);margin-top:12px;line-height:1.6}
.tos-line a{color:rgba(232,52,74,.7);text-decoration:none}

/* ── error ── */
.err{
  display:none;margin:0 32px 16px;
  background:rgba(232,52,74,.1);border:1px solid rgba(232,52,74,.3);
  border-radius:10px;padding:10px 14px;
  font-size:12px;color:#ff9eb5;line-height:1.5;
}

/* ─── RESULTS ───────────────────────────────────────────── */
#results{display:none;position:relative;z-index:1;padding:0 24px;max-width:560px;margin:0 auto}

.res-card{
  background:var(--s1);border:1px solid var(--border);border-radius:20px;
  overflow:hidden;margin-bottom:12px;
  animation:fadeUp .4s ease both;
}
.res-profile{
  display:flex;align-items:center;gap:18px;
  padding:24px;
  background:linear-gradient(135deg,rgba(232,52,74,.08),rgba(255,140,66,.04));
  border-bottom:1px solid var(--border2);
}
.res-avatar{width:72px;height:72px;border-radius:14px;border:2px solid rgba(232,52,74,.35);object-fit:cover;flex-shrink:0}
.res-avatar-ph{width:72px;height:72px;border-radius:14px;background:rgba(232,52,74,.12);display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0;border:2px solid rgba(232,52,74,.2)}
.res-name{font-family:var(--display);font-size:22px;color:#fff;margin-bottom:4px}
.res-handle{font-size:12px;color:var(--t3);font-family:var(--mono);margin-bottom:10px}
.chip{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:100px;
  font-size:11px;font-weight:700;margin-right:5px;margin-bottom:4px;
}
.chip-red{background:rgba(232,52,74,.18);border:1px solid rgba(232,52,74,.3);color:var(--r3)}
.chip-green{background:rgba(34,214,140,.12);border:1px solid rgba(34,214,140,.25);color:var(--green)}
.chip-gold{background:rgba(245,200,66,.12);border:1px solid rgba(245,200,66,.25);color:var(--gold)}
.chip-purple{background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.25);color:var(--purple)}

/* stats bar */
.res-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-bottom:1px solid var(--border2)}
.res-stat{padding:16px;text-align:center;border-right:1px solid var(--border2)}
.res-stat:last-child{border-right:none}
.res-stat-n{font-family:var(--display);font-size:24px;color:#fff}
.res-stat-l{font-size:10px;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}

/* bio */
.res-bio{padding:16px 24px;font-size:13px;color:var(--t2);line-height:1.65;border-bottom:1px solid var(--border2);font-style:italic}

/* tab panel */
.res-tabs{display:flex;border-bottom:1px solid var(--border2)}
.res-tab{
  flex:1;padding:14px;text-align:center;font-size:12px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;color:var(--t3);
  cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;
}
.res-tab:hover{color:var(--t1)}
.res-tab.on{color:var(--r3);border-bottom-color:var(--r3)}
.res-panel{display:none;max-height:240px;overflow-y:auto;padding:12px}
.res-panel.on{display:flex;flex-direction:column;gap:6px}
.r-row{
  display:flex;align-items:center;gap:12px;
  background:rgba(255,255,255,.03);border-radius:10px;padding:10px 12px;
  border:1px solid rgba(255,255,255,.05);transition:background .2s;
}
.r-row:hover{background:rgba(255,255,255,.05)}
.r-icon{width:38px;height:38px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px}
.r-icon.red{background:rgba(232,52,74,.15)}
.r-icon.purple{background:rgba(167,139,250,.12)}
.r-icon.teal{background:rgba(34,214,140,.1)}
.r-name{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.r-sub{font-size:11px;color:var(--t3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--mono)}
.r-badge{margin-left:auto;flex-shrink:0;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;background:rgba(167,139,250,.15);border:1px solid rgba(167,139,250,.25);color:var(--purple);font-family:var(--mono)}
.empty-panel{text-align:center;padding:24px;font-size:13px;color:var(--t4);font-style:italic}

/* official badges */
.ob-wrap{padding:16px 24px;border-top:1px solid var(--border2)}
.ob-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.ob-pills{display:flex;flex-wrap:wrap;gap:6px}
.ob-pill{padding:4px 12px;border-radius:100px;font-size:11px;font-weight:700;background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.2);color:var(--gold)}

/* ─── TRUST STRIP ───────────────────────────────────────── */
.trust{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1px;
  background:var(--border2);border:1px solid var(--border2);border-radius:20px;overflow:hidden;
  margin-top:56px;
}
.trust-item{background:var(--s1);padding:20px;display:flex;align-items:center;gap:12px}
.trust-icon{font-size:22px;flex-shrink:0}
.trust-label{font-size:13px;font-weight:700;color:#fff}
.trust-sub{font-size:11px;color:var(--t3);margin-top:1px}

/* ─── FOOTER ────────────────────────────────────────────── */
footer{
  position:relative;z-index:1;
  border-top:1px solid var(--border2);
  padding:32px 40px;
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:16px;
}
.foot-logo{font-family:var(--display);font-size:16px;color:var(--t3)}
.foot-logo span{color:var(--r3)}
.foot-links{display:flex;gap:20px}
.foot-link{font-size:12px;color:var(--t4);text-decoration:none;transition:color .2s}
.foot-link:hover{color:var(--t1)}
.foot-copy{font-size:11px;color:var(--t4);font-family:var(--mono)}

/* ─── UTILS ─────────────────────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;animation:spin .7s linear infinite}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
.shake{animation:shake .5s ease}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(232,52,74,.25);border-radius:4px}

/* drip svg */
.drip{display:block;width:100%;height:24px;overflow:visible}
</style>
</head>
<body>

<div class="blobs">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
</div>

<!-- ── NAV ──────────────────────────────────────────────── -->
<nav>
  <a class="nav-logo" href="#">
    <div class="nav-logo-icon">🥓</div>
    <span class="nav-logo-text">Bacon<span>Verify</span></span>
  </a>
  <div class="nav-links">
    <a class="nav-link" href="#verify">Verify</a>
    <a class="nav-link" href="#features">Features</a>
    <button class="nav-badge" onclick="scrollToVerify()">Get Started →</button>
  </div>
</nav>

<!-- ── HERO ─────────────────────────────────────────────── -->
<section class="hero">
  <div class="hero-eyebrow">
    <span></span> Live Roblox Account Scanner
  </div>
  <h1 class="hero-title">
    <span class="line1">Verify Your</span>
    <span class="line2">Bacon Status</span>
  </h1>
  <p class="hero-sub">
    Drop your Roblox ID. We'll scan your <b>badges, groups, and inventory</b> in real-time — no login required.
  </p>
  <div class="hero-stats">
    <div class="stat-pill"><div class="num">100%</div><div class="lbl">Free</div></div>
    <div class="stat-pill"><div class="num">&lt;3s</div><div class="lbl">Scan Time</div></div>
    <div class="stat-pill"><div class="num">Live</div><div class="lbl">Roblox API</div></div>
  </div>
  <div class="scroll-hint">
    <div class="scroll-arrow"></div>
    scroll to verify
